<button onclick="toggleTheme()" id="theme-toggle">☀️ Light</button>

<style>
  #theme-toggle {
    position: fixed;
    top: 14px;
    right: 16px;
    z-index: 9999;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #4a2a7a;
    background: #2d1a4a;
    color: #c9b8f0;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .04em;
  }

  @media (max-width: 1024px) {
    #theme-toggle {
      top: 60px; 
      right: 10px;
      padding: 4px 10px;
      font-size: 10px;
    }
  }
</style>

<script>
  function applyTheme(mode){
    const btn = document.getElementById('theme-toggle');
    if(mode === 'light'){
      document.body.classList.add('light-mode');
      btn.textContent = '🌙 Dark';
      btn.style.background = '#061420';
      btn.style.color = '#90cce8';
      btn.style.borderColor = '#1a3040';
    } else {
      document.body.classList.remove('light-mode');
      btn.textContent = '☀️ Light';
      btn.style.background = '#d0eef8';
      btn.style.color = '#0a5070';
      btn.style.borderColor = '#c0e4f4';
    }
  }

  function toggleTheme(){
    const isLight = document.body.classList.contains('light-mode');
    const newMode = isLight ? 'dark' : 'light';
    localStorage.setItem('theme', newMode);
    applyTheme(newMode);
  }

  const saved = localStorage.getItem('theme');
  if(saved){
    applyTheme(saved);
  } else {
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(systemDark ? 'dark' : 'light');
  }
</script>
